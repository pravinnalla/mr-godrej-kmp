name: Build KMP

on:
  push:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Keyman Developer CLI
        run: |
          npm install -g @keymanapp/kmc

      - name: Build keyboard
        run: |
          kmc build .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: keyboard
          path: |
            *.kmp
