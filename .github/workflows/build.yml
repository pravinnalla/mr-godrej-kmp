name: Build KMP

on:
  push:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Keyman Compiler
        run: npm install -g @keymanapp/kmc

      - name: Build Keyboard
        run: kmc build .

      - name: Upload KMP
        uses: actions/upload-artifact@v4
        with:
          name: mr-godrej-keyboard
          path: "*.kmp"
