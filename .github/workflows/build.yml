name: Build KMP

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Keyman Compiler (kmc)
        run: npm install -g @keymanapp/kmc

      - name: Show files (debug)
        run: ls -la

      - name: Build keyboard (.kmn → .kmx)
        run: kmc build mr-godrej.kmn

      - name: Verify .kmx output
        run: ls -la *.kmx || true

      - name: Build package (.kps → .kmp)
        run: kmc build mr-godrej.kps

      - name: Verify package output
        run: ls -la *.kmp || true

      - name: Upload KMP artifact
        uses: actions/upload-artifact@v4
        with:
          name: mr-godrej-keyboard
          path: |
            *.kmp
            *.kmx
