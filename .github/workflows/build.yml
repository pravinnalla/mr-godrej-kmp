name: Build KMP

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Keyman Compiler
        run: npm install -g @keymanapp/kmc

      - name: Force clean keyboard file
        run: |
          cat > mr-godrej.kmn << 'EOF'
store(&VERSION) "10.0"
store(&NAME) "mr-godrej"
store(&TARGETS) "windows"

begin Unicode > use(main)

group(main) using keys

'a' > 'अ'
EOF

      - name: Debug file content
        run: cat -A mr-godrej.kmn

      - name: Build KMN
        run: kmc build mr-godrej.kmn

      - name: Build KPS
        run: kmc build mr-godrej.kps

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mr-godrej-keyboard
          path: "*.kmx"
